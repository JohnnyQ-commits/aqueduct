name: CI

on:
  push:
    branches: [ main, master, 'refactor/*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=src/aqueduct --cov-report=xml --cov-report=term-missing --cov-fail-under=50 -v

      - name: Upload coverage to GitHub
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docs:
    name: Docs check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required docs exist
        run: |
          test -f README.md || (echo "README.md missing" && exit 1)
          test -f LICENSE || (echo "LICENSE missing" && exit 1)
          test -f pyproject.toml || (echo "pyproject.toml missing" && exit 1)

      - name: Verify knowledge domains
        run: |
          count=$(ls knowledge/domains/*.json 2>/dev/null | wc -l)
          if [ "$count" -lt 1 ]; then
            echo "No domain JSON files found"
            exit 1
          fi
          echo "Found $count domain files"
