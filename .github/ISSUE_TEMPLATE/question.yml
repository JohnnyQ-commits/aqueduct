name: Question / Discussion
description: Ask a question or start a discussion
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For general questions, consider using [GitHub Discussions](../../discussions) instead.
        Use this template if your question may lead to a bug fix or feature request.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish? What have you tried so far?
